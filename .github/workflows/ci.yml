name: Compiler CI

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "std/**"
      - "editors/**"
      - "tree-sitter-terlan/**"
      - "tests/**"
      - "docs/grammar/**"
      - "tools/**"
      - "scripts/**"
      - "install.sh"
      - "Makefile"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "std/**"
      - "editors/**"
      - "tree-sitter-terlan/**"
      - "tests/**"
      - "docs/grammar/**"
      - "tools/**"
      - "scripts/**"
      - "install.sh"
      - "Makefile"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"

permissions:
  contents: read

jobs:
  check:
    name: Compiler check and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"

      - name: Export OTP 29 path
        run: echo "TERLAN_OTP29_BIN=$(dirname "$(command -v erl)")" >> "$GITHUB_ENV"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Tree-sitter package dependencies
        run: npm install --prefix tree-sitter-terlan --no-audit --no-fund

      - name: Check
        run: make check

      - name: Test
        run: make test

      - name: Release-scale tests
        run: make test-release

      - name: Tree-sitter CLI grammar check
        run: make tree-sitter-cli-check

      - name: Erlang runtime matrix
        run: |
          if [ -n "${TERLAN_OTP_RUNTIME_BIN:-}" ] && [ -x "$TERLAN_OTP_RUNTIME_BIN/erl" ] && [ -x "$TERLAN_OTP_RUNTIME_BIN/erlc" ]; then
            make erlang-runtime-matrix-check
          else
            echo "Skipping runtime matrix: TERLAN_OTP_RUNTIME_BIN is not configured in this CI workspace."
          fi

      - name: 0.0.5 release gate
        run: make release-0-0-5-preflight

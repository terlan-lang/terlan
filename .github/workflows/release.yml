name: Release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: validate release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install coverage tooling
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"

      - name: Export OTP 29 path
        run: echo "TERLAN_OTP29_BIN=$(dirname "$(command -v erl)")" >> "$GITHUB_ENV"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Tree-sitter package dependencies
        run: npm install --prefix tree-sitter-terlan --no-audit --no-fund

      - name: Check
        run: make check

      - name: Test
        run: make test

      - name: Release-scale tests
        run: make test-release

      - name: Coverage ratchet
        run: make coverage-check

      - name: Editor package checks
        run: make editor-check

      - name: Tree-sitter CLI grammar check
        run: make tree-sitter-cli-check

      - name: Erlang runtime matrix
        run: |
          if [ -n "${TERLAN_OTP_RUNTIME_BIN:-}" ] && [ -x "$TERLAN_OTP_RUNTIME_BIN/erl" ] && [ -x "$TERLAN_OTP_RUNTIME_BIN/erlc" ]; then
            make erlang-runtime-matrix-check
          else
            echo "Skipping runtime matrix: TERLAN_OTP_RUNTIME_BIN is not configured in this CI workspace."
          fi

      - name: Current release preflight
        run: make release-0-0-5-preflight

  artifacts:
    name: ${{ matrix.artifact }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            release_os: Linux
            release_arch: x86_64
            artifact: terlc-linux-x86_64.tar.gz
          - runner: ubuntu-24.04-arm
            release_os: Linux
            release_arch: aarch64
            artifact: terlc-linux-aarch64.tar.gz
          - runner: macos-13
            release_os: Darwin
            release_arch: x86_64
            artifact: terlc-macos-x86_64.tar.gz
          - runner: macos-14
            release_os: Darwin
            release_arch: arm64
            artifact: terlc-macos-aarch64.tar.gz
          - runner: windows-latest
            release_os: Windows
            release_arch: AMD64
            artifact: terlc-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"

      - name: Build artifact
        env:
          TERLAN_RELEASE_OS: ${{ matrix.release_os }}
          TERLAN_RELEASE_ARCH: ${{ matrix.release_arch }}
        run: |
          cargo build --release --locked --bin terlc --bin terlan-vm
          python -B tools/package_release_artifact.py package
          python -B tools/package_release_artifact.py smoke
          python -B tools/package_release_artifact.py installer-smoke

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: publish GitHub release
    needs: artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 == "## " version { in_section = 1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "CHANGELOG.md is missing release notes for $version" >&2
            exit 1
          fi

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi
          while IFS= read -r -d '' artifact; do
            gh release upload "$GITHUB_REF_NAME" "$artifact" --clobber
          done < <(find release-artifacts -type f -name 'terlc-*' -print0)

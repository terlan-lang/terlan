name: Release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: terlc linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install coverage tooling
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"

      - name: Export OTP 29 path
        run: echo "TERLAN_OTP29_BIN=$(dirname "$(command -v erl)")" >> "$GITHUB_ENV"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Tree-sitter package dependencies
        run: npm install --prefix tree-sitter-terlan --no-audit --no-fund

      - name: Check
        run: make check

      - name: Test
        run: make test

      - name: Release-scale tests
        run: make test-release

      - name: Coverage ratchet
        run: make coverage-check

      - name: Editor package checks
        run: make editor-check

      - name: Tree-sitter CLI grammar check
        run: make tree-sitter-cli-check

      - name: Erlang runtime matrix
        run: |
          if [ -n "${TERLAN_OTP_RUNTIME_BIN:-}" ] && [ -x "$TERLAN_OTP_RUNTIME_BIN/erl" ] && [ -x "$TERLAN_OTP_RUNTIME_BIN/erlc" ]; then
            make erlang-runtime-matrix-check
          else
            echo "Skipping runtime matrix: TERLAN_OTP_RUNTIME_BIN is not configured in this CI workspace."
          fi

      - name: Current release preflight
        run: make release-0-0-5-preflight

      - name: Build artifact
        run: make release-artifact-current

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: terlc-linux-x86_64
          path: dist/terlc-linux-x86_64.tar.gz

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 == "## " version { in_section = 1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "CHANGELOG.md is missing release notes for $version" >&2
            exit 1
          fi

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi
          gh release upload "$GITHUB_REF_NAME" dist/terlc-linux-x86_64.tar.gz --clobber

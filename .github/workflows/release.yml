name: Release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: terlc linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "29"

      - name: Build artifact
        run: make release-artifact-linux

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: terlc-linux-x86_64
          path: dist/terlc-linux-x86_64.tar.gz

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "Terlan $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" dist/terlc-linux-x86_64.tar.gz --clobber
